name: Plugin CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin manifest JSON
        run: |
          echo "Checking JSON syntax..."
          jq empty .claude-plugin/plugin.json
          jq empty .claude-plugin/marketplace.json

      - name: Check version consistency
        run: |
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKET_VERSION=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          echo "plugin.json version:      $PLUGIN_VERSION"
          echo "marketplace.json version: $MARKET_VERSION"
          if [ "$PLUGIN_VERSION" != "$MARKET_VERSION" ]; then
            echo "::error::Version mismatch: plugin.json ($PLUGIN_VERSION) != marketplace.json ($MARKET_VERSION)"
            exit 1
          fi

      - name: Lint hook scripts
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck hooks/*.sh
          else
            echo "shellcheck not found, installing..."
            sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
            shellcheck hooks/*.sh
          fi

      - name: Validate skill structure
        run: |
          EXIT_CODE=0
          for skill_dir in skills/*/; do
            skill_file="${skill_dir}SKILL.md"
            skill_name=$(basename "$skill_dir")
            if [ ! -f "$skill_file" ]; then
              echo "::error::Missing SKILL.md in $skill_dir"
              EXIT_CODE=1
              continue
            fi
            if ! head -20 "$skill_file" | grep -q '^name:'; then
              echo "::error::$skill_file missing 'name:' in frontmatter"
              EXIT_CODE=1
            fi
            if ! head -20 "$skill_file" | grep -q '^description:'; then
              echo "::error::$skill_file missing 'description:' in frontmatter"
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Check cross-references
        run: |
          EXIT_CODE=0
          # Check that knowledge file references in skills resolve
          for skill_file in skills/*/SKILL.md; do
            while IFS= read -r ref_path; do
              # Strip the ${CLAUDE_PLUGIN_ROOT}/ prefix to get relative path
              rel_path=$(echo "$ref_path" | sed 's|\${CLAUDE_PLUGIN_ROOT}/||')
              if [ ! -f "$rel_path" ]; then
                echo "::error::$skill_file references $rel_path which does not exist"
                EXIT_CODE=1
              fi
            done < <(grep -oP '\$\{CLAUDE_PLUGIN_ROOT\}/[a-zA-Z0-9_./-]+' "$skill_file" || true)
          done
          # Check that template paths referenced in skills resolve
          for skill_file in skills/*/SKILL.md; do
            while IFS= read -r ref_path; do
              rel_path=$(echo "$ref_path" | sed 's|\${CLAUDE_PLUGIN_ROOT}/||')
              if [ ! -f "$rel_path" ] && [ ! -d "$rel_path" ]; then
                echo "::warning::$skill_file references $rel_path which does not exist"
              fi
            done < <(grep -oP '\$\{CLAUDE_PLUGIN_ROOT\}/templates/[a-zA-Z0-9_./-]+' "$skill_file" || true)
          done
          exit $EXIT_CODE

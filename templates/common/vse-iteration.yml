# VSE iteration state. Managed by @iteration-orchestrator and read by
# the session-start hook. One file per project, committed to the repo.
#
# This file replaces the older .vse-phase single-line file. The state model
# is iteration-centred rather than phase-centred: the temporal unit of work
# is the AMBSE microcycle (feature branch + PR), not the ISO/IEC 29110 phase.
# ISO/IEC 29110 tasks populate the centre_of_gravity field as a catalogue,
# not as a linear schedule. See knowledge/iteration-centred-operation.md.
#
# Fields:
#   version             schema version (currently 1)
#   current_iteration   the open iteration, or the most recently closed one
#     number            integer iteration counter starting at 0
#     mission           one-sentence action-first description of the iteration
#     branch            feature branch in vse/iter-NN-<slug> form
#     status            open | closing | merged
#     centre_of_gravity list of ISO/IEC 29110 task IDs (concurrent centres ok)
#     opened            ISO date string when the iteration was opened
#     macrocycle_target expected release tag (e.g. v0.2.0)
#     backlog           3-7 items the iteration intends to complete
#     closure_debt      items carried forward from a previous iteration
#     notes             free-text field for overlap or exception records
#   history             list of past iterations in the same shape
version: 1
current_iteration:
  number: 0
  mission: "Iteration 0: Architecture Zero"
  branch: vse/iter-00-architecture-zero
  status: open
  centre_of_gravity:
    - PM.1
    - SR.1
  opened: "{{DATE}}"
  macrocycle_target: "v0.1.0"
  backlog:
    - item: "Draft Statement of Work"
      status: open
      anchor: "PM.1.1"
    - item: "Set up SEMP skeleton"
      status: open
      anchor: "SR.1.1"
    - item: "Establish project repository and CM strategy"
      status: open
      anchor: "PM.1.13"
  closure_debt: []
  notes: ""
history: []

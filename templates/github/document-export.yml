name: Document Export

on:
  release:
    types: [published]

jobs:
  export:
    name: Generate Work Product Documents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Create build directory
        run: mkdir -p build/diagrams

      - name: Export PM documents
        run: |
          for f in docs/pm/*.md; do
            filename=$(basename "$f" .md)
            echo "Exporting ${filename}..."
            pandoc "$f" -o "build/${filename}.docx" --from markdown --to docx
          done

      - name: Export SR documents
        run: |
          for f in docs/sr/*.md; do
            filename=$(basename "$f" .md)
            echo "Exporting ${filename}..."
            pandoc "$f" -o "build/${filename}.docx" --from markdown --to docx
          done

      - name: Set up Java 21 (for diagrams)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install SySiDE CLI
        run: |
          mkdir -p ~/.local/bin
          # tar -xf syside-*.tar.xz -C ~/.local
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        continue-on-error: true

      - name: Generate diagrams (SySiDE)
        if: hashFiles('syside.toml') != ''
        env:
          SYSIDE_LICENSE_KEY: ${{ secrets.SYSIDE_LICENSE_KEY }}
        run: |
          sudo apt-get install -y xvfb
          xvfb-run -a syside viz view models/ --output-dir build/diagrams
        continue-on-error: true

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: work-products-${{ github.event.release.tag_name }}
          path: build/

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/*.docx
            build/diagrams/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

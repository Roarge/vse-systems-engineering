name: SysML Validation

on:
  pull_request:
    paths:
      - 'models/**/*.sysml'

jobs:
  validate:
    name: Validate SysML 2.0 Models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install SySiDE CLI
        run: |
          # Download and extract syside CLI
          # Adjust the URL and version for your installation
          mkdir -p ~/.local/bin
          # tar -xf syside-*.tar.xz -C ~/.local
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Validate models (SySiDE)
        if: hashFiles('syside.toml') != ''
        env:
          SYSIDE_LICENSE_KEY: ${{ secrets.SYSIDE_LICENSE_KEY }}
        run: syside check --warnings-as-errors --stats
        continue-on-error: true

      - name: Check formatting (SySiDE)
        if: hashFiles('syside.toml') != ''
        env:
          SYSIDE_LICENSE_KEY: ${{ secrets.SYSIDE_LICENSE_KEY }}
        run: syside format --check
        continue-on-error: true

      - name: Check traceability links (fallback)
        run: |
          echo "Checking SysML 2.0 traceability links..."
          chmod +x hooks/pre-commit-traceability.sh
          ./hooks/pre-commit-traceability.sh
        env:
          CI: true

      - name: Report results
        if: failure()
        run: |
          echo "::error::Model validation or traceability check failed."
          echo "Run 'syside check' and '@traceability-guard' locally to identify and fix issues."

# Story-branch trace gate.
#
# Per methodology §8.5.4, every pull request lands a story (or a small
# coherent group of stories) on `main`. This workflow runs the SysML
# validation and traceability check on every PR so that no story
# branch merges with broken `derive`, `frame concern`, or `verify`
# links. See `methodology/08-project-structure.md` §8.5–§8.6 for the
# full PR review obligations and `methodology/iso-29110-hooks-guide.md`
# §6 for the CI integration pattern.
#
# Translating to GitLab CI, Forgejo Actions, or Gitea Actions: invoke
# the project-side `pre-commit` hook from `<project>/.githooks/` (which
# orchestrates the trace check internally) from your host's PR
# pipeline. The hook is host-agnostic plain bash.

name: SysML Validation (story-branch trace gate)

on:
  pull_request:
    branches: [main, 'release/**']
  push:
    branches: [main]
    tags: ['release-*', 'plan-baseline-*']

jobs:
  validate:
    name: Validate SysML 2.0 Models
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install SySiDE CLI
        run: |
          # Download and extract syside CLI.
          # Adjust the URL and version for your installation.
          mkdir -p ~/.local/bin
          # tar -xf syside-*.tar.xz -C ~/.local
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Validate models (SySiDE)
        if: hashFiles('syside.toml') != '' || hashFiles('engineering/syside.toml') != ''
        env:
          SYSIDE_LICENSE_KEY: ${{ secrets.SYSIDE_LICENSE_KEY }}
        run: syside check --warnings-as-errors --stats
        continue-on-error: true

      - name: Check formatting (SySiDE)
        if: hashFiles('syside.toml') != '' || hashFiles('engineering/syside.toml') != ''
        env:
          SYSIDE_LICENSE_KEY: ${{ secrets.SYSIDE_LICENSE_KEY }}
        run: syside format --check
        continue-on-error: true

      - name: Run project-side pre-commit checks
        # Invokes the project-side pre-commit hook from .githooks/, which
        # orchestrates SysML lint, story well-formedness (§1.9), and
        # traceability integrity. The hook is project-determined; this
        # CI step runs the same checks at the unbypassable gate.
        run: |
          if [ -x .githooks/pre-commit ]; then
              .githooks/pre-commit
          elif [ -x hooks/pre-commit-traceability.sh ]; then
              hooks/pre-commit-traceability.sh
          fi
        env:
          CI: true

      - name: Report results
        if: failure()
        run: |
          echo "::error::Model validation or traceability check failed."
          echo "Run 'syside check' and '@traceability-guard' locally to identify and fix issues."

# AMBSE iteration-boundary check.
#
# Fires when a PR targeting `main` modifies `.vse-iteration.yml`, which is
# the signal that an iteration is closing and being merged. The workflow
# runs the host-side iteration-boundary-check.sh script to accumulate
# closure findings across every active centre of gravity. The check is
# advisory: missing items are reported as iteration-boundary closure debt
# but the workflow exits 0 regardless, because in real AMBSE work closing
# an iteration with debt carried forward onto the next iteration's
# backlog is normal and should not block the PR merge. The hard gate for
# closure lives at the macrocycle (release tag), not here.
#
# See knowledge/ambse-git-workflow.md for the full mapping of macrocycle
# deliveries to release tags on `main`, and
# knowledge/iteration-centred-operation.md Section 5 for why this check
# reports rather than blocks.
#
# Translating to GitLab CI, Forgejo Actions, or Gitea Actions: invoke the
# same hooks/iteration-boundary-check.sh script from your host's PR
# pipeline. The script is host-agnostic plain bash.

name: AMBSE Iteration Boundary Check

on:
  pull_request:
    paths:
      - '.vse-iteration.yml'

jobs:
  iteration-boundary:
    name: Report iteration-boundary closure status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect iteration transition
        id: iteration
        run: |
          if git diff origin/main -- .vse-iteration.yml > /dev/null 2>&1; then
            OLD_ITER=$(git show origin/main:.vse-iteration.yml 2>/dev/null | grep -m1 '^  number:' | sed 's/.*number:[[:space:]]*//' | tr -d '[:space:]' || echo "none")
            NEW_ITER=$(grep -m1 '^  number:' .vse-iteration.yml | sed 's/.*number:[[:space:]]*//' | tr -d '[:space:]')
            echo "old_iteration=${OLD_ITER}" >> "$GITHUB_OUTPUT"
            echo "new_iteration=${NEW_ITER}" >> "$GITHUB_OUTPUT"
            echo "Iteration transition: iter-${OLD_ITER} -> iter-${NEW_ITER}"
          else
            echo "No iteration change detected"
          fi

      - name: Run iteration-boundary check
        run: |
          echo "Running iteration-boundary closure check (advisory)..."
          chmod +x hooks/iteration-boundary-check.sh
          ./hooks/iteration-boundary-check.sh
        env:
          CI: true

      - name: Report results
        if: always()
        run: |
          echo "::notice::Iteration-boundary check is advisory. Any missing items are iteration-boundary closure debt and must be carried on the next iteration's backlog (closure_debt field) or resolved before the macrocycle release gate."
          echo "Run the @iteration-orchestrator skill locally to close the iteration and record the outcome in history[]."

# AMBSE phase-transition gate.
#
# Phase transitions are coarser than microcycle handoffs: they advance the
# project from one ISO 29110 activity (SR.1, SR.2, ...) to the next, and
# typically coincide with a macrocycle milestone. This workflow runs the
# host-side phase-gate-check.sh script when a PR touches `.vse-phase`,
# enforcing that the new phase's prerequisites exist before the transition
# is allowed to merge. See knowledge/ambse-git-workflow.md for the full
# mapping of macrocycle deliveries to release tags on `main`.
#
# Translating to GitLab CI, Forgejo Actions, or Gitea Actions: invoke the
# same hooks/phase-gate-check.sh script from your host's PR pipeline.
# The script is host-agnostic plain bash.

name: SysML Phase Gate (macrocycle transition gate)

on:
  pull_request:
    paths:
      - '.vse-phase'

jobs:
  phase-gate:
    name: Validate Phase Transition
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect phase transition
        id: phase
        run: |
          if git diff origin/main -- .vse-phase > /dev/null 2>&1; then
            OLD_PHASE=$(git show origin/main:.vse-phase 2>/dev/null || echo "none")
            NEW_PHASE=$(cat .vse-phase)
            echo "old_phase=${OLD_PHASE}" >> "$GITHUB_OUTPUT"
            echo "new_phase=${NEW_PHASE}" >> "$GITHUB_OUTPUT"
            echo "Phase transition: ${OLD_PHASE} -> ${NEW_PHASE}"
          else
            echo "No phase change detected"
          fi

      - name: Run phase gate check
        run: |
          echo "Validating phase gate criteria..."
          chmod +x hooks/phase-gate-check.sh
          ./hooks/phase-gate-check.sh
        env:
          CI: true

      - name: Report results
        if: failure()
        run: |
          echo "::error::Phase gate criteria not met. Review the checklist in the PR description."
          echo "Run the @lifecycle-orchestrator skill locally to check gate criteria."
